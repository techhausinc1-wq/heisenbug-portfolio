<?xml version="1.0" encoding="UTF-8"?>
<!--
  Heisenbug logo — silhouette variant.
  Recreated from conversation history (the original was a sign-in
  background SVG generated in claude.ai mid-April 2026, lost in the
  May 27 visual overhaul).

  Design brief from the original:
  - Abstract 1920s-scientist silhouette (bowler hat, suit collar,
    generic — not a real-person likeness)
  - Subtle physics motif (one atomic orbital + wave function curl)
  - Paired with the Heisenbug wordmark

  Bowler hat (round dome) is deliberately NOT a porkpie hat (flat top,
  thin brim — Walter White's hat from Breaking Bad). The bowler is
  copyright-safe and aligns with the 1920s physicist vibe rather than
  the AMC television vibe. See heisenbug-logo-porkpie.svg if you want
  the Breaking Bad-coded variant (with all the IP caveats).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" width="1400" height="320">
  <defs>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d35a6"/>
      <stop offset="100%" stop-color="#2a2480"/>
    </linearGradient>
    <radialGradient id="orbitGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3d35a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3d35a6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background atomic orbital — very subtle, behind the silhouette -->
  <g transform="translate(180, 160)">
    <ellipse cx="0" cy="0" rx="125" ry="50" fill="none" stroke="#3d35a6" stroke-width="1" opacity="0.18" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="125" ry="50" fill="none" stroke="#3d35a6" stroke-width="1" opacity="0.18" transform="rotate(-30)"/>
    <ellipse cx="0" cy="0" rx="125" ry="50" fill="none" stroke="#3d35a6" stroke-width="1" opacity="0.18" transform="rotate(90)"/>
    <circle cx="0" cy="0" r="6" fill="#b8541d" opacity="0.6"/>
  </g>

  <!-- Silhouette — 1920s scientist in bowler hat, profile right-facing -->
  <!-- Composed of: hat brim, hat dome, head outline, suit collar -->
  <g transform="translate(105, 75)" fill="url(#markGradient)">
    <!-- Bowler hat: dome + brim -->
    <!-- Dome -->
    <path d="M 30 28
             Q 30 0, 75 0
             Q 120 0, 120 28
             L 120 50
             L 30 50 Z"/>
    <!-- Brim (slightly wider than dome) -->
    <rect x="18" y="48" width="116" height="7" rx="2"/>

    <!-- Head profile (right-facing): forehead, brow, nose, lips, chin, jawline -->
    <path d="M 36 55 L 36 80 Q 36 88, 44 92 L 78 92 Q 88 92, 92 100 L 102 110 L 112 122 L 100 130 L 98 138 L 102 144 L 96 152 L 100 162 L 92 176 L 70 184 L 50 184 L 38 178 L 36 168 Z"/>

    <!-- Mustache (small bar) — completes the 1920s scientist look -->
    <rect x="100" y="132" width="14" height="5" fill="#1a1612" opacity="0.9"/>

    <!-- Suit collar + lapel (V-shape below jaw) -->
    <path d="M 36 178
             L 36 230
             L 12 240
             L 12 220
             L 36 200 Z"/>
    <path d="M 80 184
             L 110 230
             L 138 240
             L 138 220
             L 105 198
             L 88 188 Z"/>

    <!-- Suit body base (cropped at logo bottom) -->
    <path d="M 36 224
             L 138 224
             L 145 240
             L 28 240 Z"/>
  </g>

  <!-- Wordmark — "Heisenbug" in serif with rust dot above the 'i' -->
  <text x="380" y="195"
        font-family="'Fraunces', 'Source Serif Pro', Georgia, serif"
        font-weight="500"
        font-size="155"
        letter-spacing="-3"
        fill="url(#markGradient)">Heisenbug</text>
  <!-- Rust square replacing the dot on 'i' -->
  <rect x="624" y="74" width="22" height="22" fill="#b8541d"/>

  <!-- Tagline (mono caps) -->
  <text x="382" y="250"
        font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', monospace"
        font-size="22"
        font-weight="500"
        letter-spacing="6"
        fill="#5a5550">VERTICAL SOFTWARE FOR OPERATORS</text>

</svg>
