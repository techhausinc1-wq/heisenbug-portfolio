<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StockScout">
  <meta name="theme-color" content="#3d35a6">
  <title>StockScout — HVAC Field Inventory</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <style>
    :root {
      --paper: #f7f3e9;
      --paper-2: #fcfaf3;
      --ink: #1a1612;
      --muted: #6a6560;
      --line: #d9d1bf;
      --indigo: #3d35a6;
      --indigo-deep: #2a2480;
      --indigo-soft: #f0eef9;
      --rust: #b8541d;
      --rust-soft: #fbf2eb;
      --green: #2f7a3e;
      --green-soft: #e8f3ea;
      --amber: #b8770a;
      --red: #b81d2a;
      --red-soft: #fdf1f1;
      --shadow: 0 1px 2px rgba(10,9,8,0.04), 0 4px 16px rgba(10,9,8,0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: 'Plus Jakarta Sans', -apple-system, 'Helvetica Neue', sans-serif;
      font-size: 15px;
      line-height: 1.4;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    body { min-height: 100vh; }

    /* Layout primitives */
    .app { max-width: 720px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--paper);
      border-bottom: 0.5px solid var(--line);
      padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .topbar h1 {
      font-family: 'Fraunces', 'Source Serif Pro', Georgia, serif;
      font-size: 20px; font-weight: 500; margin: 0; letter-spacing: -0.3px;
    }
    .topbar .crumb { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
    .topbar .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .content { flex: 1; padding: 14px 18px 100px; }
    .footer-tabs {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: var(--paper-2);
      border-top: 0.5px solid var(--line);
      display: flex; max-width: 720px; margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab {
      flex: 1; padding: 12px 6px 14px;
      background: transparent; border: none;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      color: var(--muted); cursor: pointer;
      font-family: inherit; font-size: 10px; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .tab.active { color: var(--indigo); }
    .tab .ic { font-size: 22px; line-height: 1; }

    /* Cards */
    .card {
      background: var(--paper-2);
      border: 0.5px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card.row { display: flex; align-items: center; gap: 12px; }
    .card.row:hover { background: #fffdf7; cursor: pointer; }

    /* Typography */
    .label { font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
    .display { font-family: 'Fraunces', 'Source Serif Pro', Georgia, serif; font-size: 28px; font-weight: 400; letter-spacing: -0.5px; line-height: 1.1; }
    .num { font-family: 'Fraunces', 'Source Serif Pro', Georgia, serif; font-size: 22px; font-weight: 600; line-height: 1; }
    .strong { font-weight: 600; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 16px; border-radius: 8px;
      border: 0.5px solid var(--line); background: var(--paper-2);
      color: var(--ink); font-family: inherit; font-size: 14px; font-weight: 600;
      cursor: pointer; min-height: 38px;
      transition: background 80ms;
    }
    .btn:hover { background: #fffdf7; }
    .btn.primary { background: var(--indigo); color: white; border-color: var(--indigo); }
    .btn.primary:hover { background: var(--indigo-deep); }
    .btn.rust { background: var(--rust); color: white; border-color: var(--rust); }
    .btn.full { width: 100%; }
    .btn.lg { padding: 14px 20px; font-size: 15px; min-height: 50px; }
    .btn.icon { padding: 8px 10px; min-height: auto; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Pills */
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      font-size: 11px; font-weight: 600;
      background: var(--indigo-soft); color: var(--indigo);
    }
    .pill.rust { background: var(--rust-soft); color: var(--rust); }
    .pill.green { background: var(--green-soft); color: var(--green); }
    .pill.red { background: var(--red-soft); color: var(--red); }
    .pill.gray { background: #efe8d8; color: var(--muted); }

    /* Inputs */
    .input, .select {
      width: 100%; padding: 11px 14px;
      border: 0.5px solid var(--line); border-radius: 8px;
      background: var(--paper-2); color: var(--ink);
      font-family: inherit; font-size: 16px;
      outline: none;
    }
    .input:focus, .select:focus { background: white; border-color: var(--indigo); }

    /* Lists */
    .item-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      border: 0.5px solid var(--line); border-radius: 10px;
      background: var(--paper-2); margin-bottom: 8px;
      cursor: pointer;
    }
    .item-row:hover { background: #fffdf7; }
    .item-row .meta { flex: 1; min-width: 0; }
    .item-row .name { font-weight: 600; font-size: 14px; }
    .item-row .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .item-row .qty-block { text-align: right; min-width: 80px; }
    .item-row .qty-here { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; line-height: 1; }
    .item-row .qty-total { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.3px; }
    .item-row .low { color: var(--red); }

    /* Sections */
    .section-h {
      display: flex; align-items: baseline; justify-content: space-between;
      margin: 16px 2px 8px;
    }

    /* Stat cards */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat {
      padding: 14px;
      border: 0.5px solid var(--line); border-radius: 10px;
      background: var(--paper-2);
    }
    .stat .v { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 600; color: var(--indigo); line-height: 1; }
    .stat .l { font-size: 10px; font-weight: 600; color: var(--muted); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 4px; }

    /* Scanner overlay */
    .scanner-stage {
      position: relative; width: 100%; aspect-ratio: 4/3;
      background: #000; border-radius: 14px; overflow: hidden;
    }
    .scanner-stage video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .scanner-frame {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 78%; max-width: 380px; aspect-ratio: 3/2;
      border: 2px solid #d4d419;
      border-radius: 8px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.4);
    }
    .scanner-frame::before, .scanner-frame::after,
    .scanner-frame > span::before, .scanner-frame > span::after {
      content: ''; position: absolute; width: 18px; height: 18px;
      border-color: #f59e0b; border-style: solid; border-width: 0;
    }
    .scanner-frame::before { top: -3px; left: -3px; border-top-width: 3px; border-left-width: 3px; }
    .scanner-frame::after { top: -3px; right: -3px; border-top-width: 3px; border-right-width: 3px; }
    .scanner-frame > span::before { bottom: -3px; left: -3px; border-bottom-width: 3px; border-left-width: 3px; }
    .scanner-frame > span::after { bottom: -3px; right: -3px; border-bottom-width: 3px; border-right-width: 3px; }
    .scanner-status {
      position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.7); color: white; padding: 6px 14px;
      border-radius: 999px; font-size: 12px; font-weight: 600;
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,9,8,0.45);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn 120ms ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 100%; max-width: 540px; margin: 0;
      background: var(--paper);
      border-radius: 18px 18px 0 0;
      padding: 22px;
      animation: slideUp 220ms cubic-bezier(0.22,0.61,0.36,1);
      max-height: 90vh; overflow-y: auto;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h2 { margin: 0 0 14px; font-family: 'Fraunces', serif; font-weight: 500; font-size: 22px; }
    .modal .grab { width: 36px; height: 4px; background: var(--line); border-radius: 2px; margin: 0 auto 16px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: white;
      padding: 12px 20px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
      z-index: 200;
      animation: toastIn 200ms ease-out;
    }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 14px); } to { opacity: 1; transform: translate(-50%, 0); } }

    /* Splash / login */
    .splash {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 30px;
      background: radial-gradient(ellipse at top, #fcfaf3 0%, var(--paper) 60%);
    }
    .brandmark {
      font-family: 'Fraunces', serif; font-size: 40px; font-weight: 400;
      letter-spacing: -1px; color: var(--indigo);
      display: flex; align-items: baseline; gap: 8px;
    }
    .brandmark .dot { width: 12px; height: 12px; background: var(--rust); display: inline-block; }
    .brandtag {
      font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 9.5px;
      color: var(--muted); letter-spacing: 3px; text-transform: uppercase;
      margin-top: 8px;
    }
    .splash .panel {
      margin-top: 36px; width: 100%; max-width: 420px;
      background: var(--paper-2);
      border: 0.5px solid var(--line); border-radius: 14px;
      padding: 22px;
    }
    .worker-pick {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; margin-bottom: 8px;
      border: 0.5px solid var(--line); border-radius: 10px;
      background: white; cursor: pointer;
      transition: all 80ms;
    }
    .worker-pick:hover { border-color: var(--indigo); background: var(--indigo-soft); }
    .worker-pick .av {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--indigo-soft); color: var(--indigo);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
    }
    .worker-pick .role-tag { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* Item detail */
    .loc-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      border: 0.5px solid var(--line); border-radius: 10px;
      background: var(--paper-2); margin-bottom: 8px;
    }
    .loc-bar.zero { background: var(--red-soft); border-color: #f4c0c5; }
    .loc-bar .nm { font-weight: 600; font-size: 13px; }
    .loc-bar .v { font-family: 'Fraunces', serif; font-size: 20px; font-weight: 600; }

    /* History */
    .history-row {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 0.5px solid var(--line);
    }
    .history-row:last-child { border-bottom: none; }
    .history-row .when { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); min-width: 64px; }
    .history-row .desc { flex: 1; font-size: 13px; }
    .history-row .delta { font-weight: 700; font-size: 14px; min-width: 50px; text-align: right; }
    .history-row .delta.pos { color: var(--green); }
    .history-row .delta.neg { color: var(--red); }

    /* Quick-adjust */
    .qa-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin: 18px 0; }
    .qa-big { font-family: 'Fraunces', serif; font-size: 56px; font-weight: 600; color: var(--indigo); text-align: center; line-height: 1; }
    .qa-btn {
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--paper-2); border: 0.5px solid var(--line);
      font-size: 24px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .qa-btn:hover { background: white; }
    .qa-btn.minus { color: var(--rust); }
    .qa-btn.plus { color: var(--green); }

    /* PAR check rows */
    .par-row {
      display: grid; grid-template-columns: 1fr auto auto auto;
      gap: 10px; align-items: center;
      padding: 10px 12px;
      border-bottom: 0.5px solid var(--line);
    }
    .par-row.short { background: var(--red-soft); }
    .par-row .nm { font-size: 13px; font-weight: 600; }
    .par-row .vs { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); }
    .par-row .gap { font-family: 'Fraunces', serif; font-weight: 700; font-size: 18px; }
    .par-row .gap.neg { color: var(--red); }
    .par-row .gap.ok { color: var(--green); }

    /* Refrigerant log */
    .refrig-banner {
      background: var(--rust-soft);
      border: 0.5px solid #f0d4bc;
      padding: 12px 14px; border-radius: 10px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .refrig-banner .h { font-weight: 700; color: var(--rust); }

    /* Owner dashboard alerts */
    .alert-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border: 0.5px solid var(--line); border-radius: 10px;
      background: var(--paper-2); margin-bottom: 6px;
      font-size: 13px;
    }
    .alert-row.red { background: var(--red-soft); border-color: #f4c0c5; }
    .alert-row.rust { background: var(--rust-soft); border-color: #f0d4bc; }
    .alert-row .ic { font-size: 18px; }

    /* AI thinking */
    .ai-think {
      padding: 24px; text-align: center;
    }
    .ai-think .pulse {
      width: 60px; height: 60px; border-radius: 50%;
      background: var(--indigo-soft);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 18px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
    }
    .ai-think .pulse svg { width: 28px; height: 28px; color: var(--indigo); }

    /* Voice button */
    .voice-fab {
      position: fixed; bottom: 88px; right: 18px; z-index: 60;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--indigo); color: white; border: none;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(61,53,166,0.4);
      cursor: pointer; font-size: 24px;
    }
    .voice-fab.listening { background: var(--rust); animation: pulse 1s infinite; }

    /* Responsive tweaks */
    @media (max-width: 380px) {
      body { font-size: 14px; }
      .topbar { padding: 12px 14px; }
      .content { padding: 12px 14px 100px; }
    }
  </style>

// ---------- State ----------

const STORE_KEY = 'stockscout.v1.state';

const State = {
  worker: null,
  loc: null,        // current viewing location
  view: 'home',
  stock: null,
  history: null,

  load() {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      try {
        const parsed = JSON.parse(raw);
        this.stock = parsed.stock;
        this.history = parsed.history;
        this.worker = parsed.worker;
        this.loc = parsed.loc;
        if (parsed.view) this.view = parsed.view;
        if (parsed.viewParams) this.viewParams = parsed.viewParams;
        return;
      } catch (_) {}
    }
    this.stock = JSON.parse(JSON.stringify(SEED_STOCK));
    this.history = JSON.parse(JSON.stringify(SEED_HISTORY));
  },
  save() {
    localStorage.setItem(STORE_KEY, JSON.stringify({
      stock: this.stock,
      history: this.history,
      worker: this.worker,
      loc: this.loc,
      view: this.view,
      viewParams: this.viewParams
    }));
  },
  reset() {
    localStorage.removeItem(STORE_KEY);
    this.stock = JSON.parse(JSON.stringify(SEED_STOCK));
    this.history = JSON.parse(JSON.stringify(SEED_HISTORY));
    this.worker = null;
    this.loc = null;
    render();
  },
  qty(sku, loc) {
    return (this.stock[sku] && this.stock[sku][loc]) || 0;
  },
  total(sku) {
    if (!this.stock[sku]) return 0;
    return Object.values(this.stock[sku]).reduce((a, b) => a + b, 0);
  },
  setQty(sku, loc, qty, note) {
    const prev = this.qty(sku, loc);
    const delta = qty - prev;
    if (!this.stock[sku]) this.stock[sku] = {};
    this.stock[sku][loc] = Math.max(0, qty);
    if (delta !== 0) {
      this.history.unshift({
        ts: Date.now(), worker: this.worker.id, sku,
        from: delta < 0 ? loc : null,
        to: delta > 0 ? loc : null,
        delta, note: note || 'Manual adjustment'
      });
      this.history = this.history.slice(0, 250);
    }
    this.save();
  },
  moveStock(sku, from, to, delta, note) {
    if (from) this.stock[sku][from] = Math.max(0, (this.stock[sku][from] || 0) - delta);
    if (to)   this.stock[sku][to]   = ((this.stock[sku][to] || 0) + delta);
    this.history.unshift({
      ts: Date.now(), worker: this.worker.id, sku,
      from, to, delta: to ? delta : -delta, note: note || 'Stock move'
    });
    this.history = this.history.slice(0, 250);
    this.save();
  }
};

const lookupItem = (sku) => ITEMS.find(i => i.sku === sku);
const lookupItemByBarcode = (bc) => ITEMS.find(i => i.bc === bc);
const lookupWorker = (id) => WORKERS.find(w => w.id === id);
const lookupLoc = (id) => LOCATIONS.find(l => l.id === id);

// ---------- View routing ----------

function setView(v, params) {
  State.view = v;
  State.viewParams = params || {};
  render();
  window.scrollTo(0, 0);
}

// ---------- Render ----------

function render() {
  if (!State.worker) return renderSplash();
  document.getElementById('topbar').outerHTML = renderTopbar();
  document.getElementById('tabs').outerHTML = renderTabs();
  const c = document.getElementById('content');
  c.innerHTML = '';
  const view = ({
    home: viewHome,
    inventory: viewInventory,
    scanner: viewScanner,
    item: viewItem,
    par: viewPar,
    dashboard: viewDashboard,
    refrig: viewRefrigLog,
    settings: viewSettings
  })[State.view] || viewHome;
  c.appendChild(view());
  // voice fab only shown to tech/warehouse, not on splash
  document.getElementById('voice-fab').style.display = State.worker ? 'flex' : 'none';
}

function renderSplash() {
  document.body.innerHTML = `

// ---------- View: Home ----------

function viewHome() {
  const loc = lookupLoc(State.loc);
  const totalValue = Object.entries(State.stock).reduce((sum, [sku, locMap]) => {
    const item = lookupItem(sku);
    return sum + ((locMap[State.loc] || 0) * (item ? item.cost : 0));
  }, 0);
  const itemCount = Object.entries(State.stock).filter(([_, locMap]) => (locMap[State.loc] || 0) > 0).length;
  const lowStock = ITEMS.filter(i => {
    const q = State.qty(i.sku, State.loc);
    return q > 0 && q <= i.min;
  });

  const wrap = document.createElement('div');
  wrap.innerHTML = `
    <div class="label" style="margin-bottom:6px;">${loc.type === 'truck' ? 'Today on' : "You're viewing"}</div>

    </div>

      <div class="section-h">
        <div class="label" style="color:var(--rust);">⚠ Low stock at this location</div>
        <div class="label">${lowStock.length}</div>
      </div>

        <div class="item-row" data-sku="${i.sku}">
          <div class="meta">
            <div class="name">${i.name}</div>
            <div class="sub">${i.cat} · min ${i.min} ${i.uom}</div>
          </div>
          <div class="qty-block">
            <div class="qty-here low">${State.qty(i.sku, State.loc)}</div>
            <div class="qty-total">${State.total(i.sku)} total</div>
          </div>
        </div>
      `).join('')}

    <div class="section-h">
      <div class="label">Recent activity</div>
      <div class="label">${State.history.length}</div>
    </div>

      ${State.history.slice(0, 6).map(h => historyRow(h)).join('')}

  `;
  bindNavs(wrap);
  return wrap;

function historyRow(h) {
  const item = lookupItem(h.sku);
  const worker = lookupWorker(h.worker);
  const minsAgo = Math.floor((Date.now() - h.ts) / 60000);
  const when = minsAgo < 1 ? 'now' : minsAgo < 60 ? `${minsAgo}m` : `${Math.floor(minsAgo / 60)}h`;
  const cls = h.delta > 0 ? 'pos' : 'neg';
  return `<div class="history-row">
    <div class="when">${when}</div>
    <div class="desc">
      <div class="strong" style="font-size:13px;">${item ? item.name : h.sku}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">
        ${worker ? worker.name : h.worker} · ${h.from ? lookupLoc(h.from).name : 'Outside'} → ${h.to ? lookupLoc(h.to).name : 'Used'}
      </div>
    </div>
    <div class="delta ${cls}">${h.delta > 0 ? '+' : ''}${h.delta}</div>
  </div>`;
}

    </div>
    <div id="inv-list"></div>
  `;
  const renderList = () => {
    const q = (wrap.querySelector('#search').value || '').toLowerCase();
    const cat = wrap.querySelector('.pill[style*="background: var(--indigo-soft)"]')
      ? wrap.querySelector('.pill[style*="background: var(--indigo-soft)"]').dataset.cat
      : '';
    const filtered = ITEMS.filter(i => {
      if (cat && i.cat !== cat) return false;
      if (q && !(`${i.name} ${i.sku} ${i.bc}`.toLowerCase().includes(q))) return false;
      return true;
    });
    wrap.querySelector('#inv-list').innerHTML = filtered.map(i => {
      const here = State.qty(i.sku, State.loc);
      const total = State.total(i.sku);
      return `<div class="item-row" data-sku="${i.sku}">
        <div class="meta">
          <div class="name">${i.name}</div>
          <div class="sub">${i.cat} · ${i.uom}${i.refr ? ' · §608' : ''}</div>
        </div>
        <div class="qty-block">
          <div class="qty-here ${here > 0 && here <= i.min ? 'low' : ''}">${here}</div>
          <div class="qty-total">${total} total</div>
        </div>
      </div>`;
    }).join('') || `<div class="label" style="text-align:center;padding:30px;">Nothing matches</div>`;
    bindNavs(wrap);
  };
  wrap.querySelector('#search').addEventListener('input', renderList);
  wrap.querySelectorAll('.pill').forEach(p => p.addEventListener('click', () => {
    wrap.querySelectorAll('.pill').forEach(x => x.style.background = '#efe8d8');

    p.style.color = 'var(--indigo)';
    renderList();
  }));
  renderList();
  return wrap;
}

let scannerActive = false;
let codeReader = null;
async function startScanner(scope) {
  if (scannerActive) return;
  scannerActive = true;
  const video = scope.querySelector('#vid');
  const status = scope.querySelector('#status');
  try {
    if (!window.ZXingBrowser) { status.textContent = 'Scanner library not loaded'; return; }
    codeReader = new ZXingBrowser.BrowserMultiFormatReader();
    const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();
    if (!devices.length) { status.textContent = 'No camera detected'; return; }
    const back = devices.find(d => /back|rear|environment/i.test(d.label)) || devices[devices.length - 1];
    status.textContent = 'Looking for barcode…';
    codeReader.decodeFromVideoDevice(back.deviceId, video, (result) => {
      if (result) {
        const code = result.getText();
        status.textContent = 'Got it: ' + code;
        handleScan(code);
        stopScanner();
      }
    });
  } catch (err) {
    status.textContent = 'Camera blocked — use Manual';
    console.warn('Scanner error', err);
  }
}
function stopScanner() {
  if (codeReader) { try { codeReader.reset(); } catch (_) {} }
  scannerActive = false;
}

function handleScan(code) {
  const item = lookupItemByBarcode(code) || lookupItem(code);
  if (item) {
    openAdjust(item.sku, State.loc, true);
  } else {
    showToast(`Unknown code: ${code}`);
  }
}

function viewPar() {

// ---------- Voice query ----------

let recog = null;
function bindVoiceFab() {
  const fab = document.getElementById('voice-fab');
  fab.addEventListener('click', () => startVoice(fab));
}

function startVoice(fab) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Voice not supported in this browser'); return; }
  if (!recog) {
    recog = new SR();
    recog.continuous = false;
    recog.interimResults = false;
    recog.lang = 'en-US';
  }
  fab.classList.add('listening');
  fab.textContent = '🔴';
  showToast('Listening… ask about a part');
  recog.onresult = (ev) => {
    const text = ev.results[0][0].transcript.toLowerCase();
    handleVoiceQuery(text);
  };
  recog.onerror = () => { fab.classList.remove('listening'); fab.textContent = '🎙'; };
  recog.onend = () => { fab.classList.remove('listening'); fab.textContent = '🎙'; };
  recog.start();
}

function handleVoiceQuery(text) {
  // Naive matcher — find any item whose name contains keywords from the query
  const words = text.split(/\s+/).filter(w => w.length > 2);
  const matches = ITEMS.filter(i => {
    const name = i.name.toLowerCase();
    return words.some(w => name.includes(w));
  });
  if (!matches.length) {
    speakAnswer(`I couldn't find anything matching ${text}`);
    showToast(`No match: "${text}"`);
    return;
  }
  const top = matches[0];
  const here = State.qty(top.sku, State.loc);
  const total = State.total(top.sku);
  const answer = `You have ${here} ${top.uom} of ${top.name} on ${lookupLoc(State.loc).name}, ${total} total across all locations.`;
  speakAnswer(answer);
  showToast(`${here} at ${lookupLoc(State.loc).name} · ${total} total`);
  setView('item', { sku: top.sku });
}

function speakAnswer(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.05;
  speechSynthesis.speak(u);
}

// ---------- Helpers ----------

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}
function closeModal(m) { m.remove(); }
function bindNavs(scope) {
  scope.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => setView(el.dataset.go)));
  scope.querySelectorAll('[data-sku]').forEach(el => el.addEventListener('click', () => setView('item', { sku: el.dataset.sku })));
}

// Top-level event delegation (tabs, location switcher, signout) — re-bind on every render
document.addEventListener('click', (e) => {
  const tab = e.target.closest('.tab[data-go]');
  if (tab) setView(tab.dataset.go);
  if (e.target.id === 'signout-btn') {
    State.worker = null; State.loc = null;
    localStorage.removeItem(STORE_KEY);
    document.body.innerHTML = `<div class="app"><div id="topbar"></div><div id="content" class="content"></div><div id="tabs"></div></div><button id="voice-fab" class="voice-fab" style="display:none;">🎙</button>`;
    renderSplash();
  }
});
document.addEventListener('change', (e) => {
  if (e.target.id === 'loc-switcher') {
    State.loc = e.target.value;
    State.save();
    render();
  }
});

// ---------- Boot ----------

State.load();
if (State.worker) {
  bindVoiceFab();
  render();
} else {
  renderSplash();
}

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

<script id="hb-toast-script">
(function() {
  const el = document.getElementById('hb-toast');
  let t;
  function showToast(label, msg) {
    el.innerHTML = '<span class="h">' + label + '</span>' + (msg ? '<span class="m">' + msg + '</span>' : '');
    el.classList.add('show');
    clearTimeout(t);
    t = setTimeout(function() { el.classList.remove('show'); }, 3200);
  }

  // Intent → message map. First match wins.
  const intents = [
    { re: /^\+\s*new\s+(?:referral|patient|guest|call|appointment|client|customer|case|order|job|booking|prospect|lead|account|item|invoice|loop|memo|appraisal|milestone|machine|stop|property|chart|file)/i,
      label: '✓ Form staged', m: 'Would open the create-new form in your production cockpit.' },
    { re: /^\+\s*add\b/i,
      label: '✓ Added', m: 'Would persist to the database in your production cockpit.' },
    { re: /^submit\b/i,
      label: '✓ Submitted', m: 'Would post to the billing / claims / state aggregator endpoint.' },
    { re: /^export\b|^download\b/i,
      label: '✓ Export queued', m: 'Would generate the CSV / PDF report in your production cockpit.' },
    { re: /^send(?:\s|$)/i,
      label: '✓ Sent', m: 'Would dispatch the email / SMS / push in your production cockpit.' },
    { re: /^print\b/i,
      label: '✓ Print queued', m: 'Would generate the printable view in your production cockpit.' },
    { re: /^sync(?:\s|now|$)/i,
      label: '✓ Sync triggered', m: 'Would pull the latest from connected APIs (iCal, EVV aggregator, bank, etc.).' },
    { re: /^auto-correct\b|^correct\b|^resubmit\b/i,
      label: '✓ Resubmitted', m: 'Would auto-correct the claim and resubmit to the payer.' },
    { re: /^schedule\b|^book\b/i,
      label: '✓ Scheduled', m: 'Would create the appointment and notify the assignee.' },
    { re: /^reorder\b|^restock\b/i,
      label: '✓ Reorder placed', m: 'Would post to Amazon Subscribe & Save (or your configured supplier).' },
    { re: /^request\b/i,
      label: '✓ Request sent', m: 'Would notify the recipient / payer / scheduling team.' },
    { re: /^reply\b|^respond\b/i,
      label: '✓ Draft saved', m: 'Would open the response composer in your production cockpit.' },
    { re: /^message\b|^text\b/i,
      label: '✓ Message staged', m: 'Would open the secure messaging thread in your production cockpit.' },
    { re: /^call\b|^dial\b/i,
      label: '✓ Calling…', m: 'Would launch the phone dialer with the contact pre-loaded.' },
    { re: /^generate\b/i,
      label: '✓ Generated', m: 'Would compose the document and download / preview.' },
    { re: /^notify\b/i,
      label: '✓ Notified', m: 'Would send the alert to the relevant team / care manager.' },
    { re: /^edit\b/i,
      label: '✓ Edit mode', m: 'Would open the inline editor in your production cockpit.' },
    { re: /^regenerate\b/i,
      label: '✓ Regenerating…', m: 'Would call the LLM with a fresh prompt context.' },
    { re: /^filter\b|^sort\b/i,
      label: '✓ Filter applied', m: 'Would refresh the list with the selected criteria.' },
    { re: /^view\b|^open\b|^see\b/i,
      label: '✓ Opened', m: 'Would navigate to the detail view in your production cockpit.' },
    // Fallback for any other button
    { re: /./,
      label: '✓ Action staged', m: 'Demo button — would execute this action in your production cockpit.' }
  ];

  function describe(text) {
    text = (text || '').trim();
    for (const i of intents) {
      if (i.re.test(text)) return { label: i.label, m: i.m };
    }
    return { label: '✓ Action staged', m: 'Demo button — would execute this in your production cockpit.' };
  }

  // Capture-late handler so existing real handlers run first.
  document.addEventListener('click', function(e) {
    // skip if real handler already prevented default
    if (e.defaultPrevented) return;
    const t = e.target.closest('button, .btn, [role="button"]');
    if (!t) return;
    // skip if it's a nav-toggle button with data-panel (existing handler)
    if (t.classList.contains('nav-btn') || t.classList.contains('view-btn') || t.classList.contains('cgs-btn') || t.classList.contains('filter-btn')) return;
    // skip submit-type buttons inside forms (let form handle)
    if (t.type === 'submit' && t.form) return;
    // skip disabled
    if (t.disabled) return;
    // skip links with href (let them navigate)
    if (t.tagName === 'A' && t.getAttribute('href') && t.getAttribute('href') !== '#') return;

    const text = t.textContent.replace(/\s+/g, ' ').trim();
    if (!text) return;
    const d = describe(text);
    showToast(d.label, d.m);
  }, false);
})();
</script>


<script id="hb-universal-state">
(function() {
  // Demo-specific localStorage key — derive from URL path
  const KEY = 'hb-' + (location.pathname.replace(/[^a-z0-9]/gi, '-') || 'demo') + '-state-v1';
  const state = JSON.parse(localStorage.getItem(KEY) || '{"added":[]}');
  function save() { localStorage.setItem(KEY, JSON.stringify(state)); }

  // Sample name pools
  const FIRST = ['Maya','Lena','Sofia','Carla','Joaquín','Ezra','Ramón','Ines','Yuri','Linnea','Theo','Dax','Anya','Jonah','Mira','Kofi','Hideo','Esther','Carlos','Adelaide','Petra','Nikolai','Sienna','Reza','Aaron','Becca','Catalina','Demir','Elena','Felix','Gigi'];
  const LAST = ['Bautista','Hollander','Vance','Okeke','Park','Brennan','Faris','Kowalski','Diaz','Eriksson','Adair','Liu','Talbot','Marston','Hadid','Nakamura','Patel','Olson','Mendez','Cohen','Rao','Castro','Singh','Yamamoto','Ozdemir','Rivera','Brooks','Pham','Costa','Greco','Hwang'];
  const ENTITIES = ['Acme','BlueRiver','Cascade','Delta','Evergreen','Foxglove','Granite','Harbor','Ironside','Juniper','Kestrel','Lighthouse','Meridian','NorthStar','Oakridge','Pinecone','Quarry','Ridgeline','Sandstone','Tideline','Umbra','Vantage','Westfield','Yonder'];
  const SFX = ['Holdings','LLC','Group','Co.','Inc.','Partners','Industries','Services','Studios','Works'];

  function rnd(a) { return a[Math.floor(Math.random()*a.length)]; }
  function genName() { return rnd(FIRST) + ' ' + rnd(LAST); }
  function genBiz() { return rnd(ENTITIES) + ' ' + rnd(SFX); }
  function uid() { return 'x-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,5); }
  function timeNow() { return new Date().toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'}); }

  // Detect what kind of entity the button is creating
  function classifyButton(text) {
    text = text.toLowerCase();
    if (/patient|caregiver|guest|client/.test(text)) return { kind: 'person', label: 'patient/client', context: 'name + meta' };
    if (/referral|lead|prospect|inquiry/.test(text)) return { kind: 'person', label: 'referral', context: 'name + source' };
    if (/call|appointment|booking|reservation|visit/.test(text)) return { kind: 'event', label: 'appointment', context: 'time + name' };
    if (/ro\b|work\s*order|repair|service\s*call|job/.test(text)) return { kind: 'job', label: 'work order', context: 'job + asset' };
    if (/property|listing|account/.test(text)) return { kind: 'asset', label: 'property/account', context: 'name + meta' };
    if (/machine|stop|location/.test(text)) return { kind: 'asset', label: 'machine/stop', context: 'name + location' };
    if (/order|invoice|case|claim/.test(text)) return { kind: 'order', label: 'order/invoice', context: 'id + amount' };
    if (/staff|employee|stylist|tech|caregiver/.test(text)) return { kind: 'person', label: 'staff', context: 'name + role' };
    return { kind: 'item', label: 'item', context: 'name + meta' };
  }

  // Render the new entry as compatible-looking HTML for common container patterns
  function renderEntry(type, container) {
    const name = type.kind === 'asset' ? genBiz() : genName();
    const id = uid();
    const t = timeNow();
    // Detect container style: kanban, list, timeline, table
    if (container.classList.contains('kbody') || container.closest('.kcol')) {
      // kanban card
      return {
        id, html: '<div class="kcard" data-hb-id="' + id + '" style="border:1.5px solid #4a7d3e; background:linear-gradient(135deg,#f0f7e8,#fff); position:relative;"><span style="position:absolute; top:6px; right:8px; font-family:Inter,sans-serif; font-size:9px; background:#1f6b3a; color:white; padding:2px 6px; border-radius:8px; font-weight:700;">NEW</span><span style="display:block; font-family:JetBrains Mono,monospace; font-size:9.5px; color:#7a7264; margin-bottom:3px;">' + t + '</span><div style="font-weight:600; font-size:13px;">' + name + '</div><div style="font-size:11px; color:#7a7264; margin-top:2px;">Newly added · click to open</div></div>'
      };
    }
    if (container.classList.contains('pt-list') || container.querySelector('.pt')) {
      // patient list style
      return {
        id, html: '<div class="pt" data-hb-id="' + id + '" style="background:linear-gradient(90deg, rgba(31,107,58,0.06), transparent); border-left:3px solid #1f6b3a;"><div class="nm" style="color:#1f6b3a; font-weight:600;">' + name + ' <span style="font-family:Inter,sans-serif; font-size:9px; background:#1f6b3a; color:white; padding:1px 5px; border-radius:6px; font-weight:700; vertical-align:2px;">NEW</span></div><div class="meta" style="font-size:11.5px; color:#6a7068; margin-top:1px;">Just added · ' + t + '</div></div>'
      };
    }
    // Generic card / timeline row
    return {
      id, html: '<div data-hb-id="' + id + '" style="padding:11px 14px; background:linear-gradient(90deg, rgba(31,107,58,0.08), transparent); border-left:3px solid #1f6b3a; border-radius:0 8px 8px 0; margin:6px 0; font-size:12.5px; display:flex; justify-content:space-between; align-items:center;"><div><div style="font-weight:600;">' + name + ' <span style="font-family:Inter,sans-serif; font-size:9px; background:#1f6b3a; color:white; padding:1px 5px; border-radius:6px; font-weight:700;">NEW</span></div><div style="font-size:11px; color:#6a7068; margin-top:1px;">Added ' + t + '</div></div></div>'
    };
  }

  // Find the most likely target container near a + New button
  function findTarget(btn) {
    // Look up to ancestors for a panel, then scan for first list-like container
    const candidates = [
      '.kanban .kcol.hot .kbody',  // first/leftmost kanban column
      '.kcol .kbody',
      '.pt-list',
      '.tile-list',
      '.list',
      '.timeline',
      'tbody',
      '.cards',
      '.grid',
      '[data-list]'
    ];
    // Search same panel first
    let panel = btn.closest('[data-panel]') || btn.closest('main') || document.body;
    for (const sel of candidates) {
      const c = panel.querySelector(sel);
      if (c) return c;
    }
    // Fallback: anywhere in the document
    for (const sel of candidates) {
      const c = document.querySelector(sel);
      if (c) return c;
    }
    return null;
  }

  function isNewButton(t) {
    const txt = (t.textContent || '').trim();
    if (!txt) return false;
    // Match "+ New X" or "Add X" or "New X" pattern
    return /^[+\s]*new\s+|^add\s+|^create\s+|^\+\s*new/i.test(txt) && txt.length < 60;
  }

  function showToast(label, msg) {
    const t = document.getElementById('hb-toast');
    if (!t) return;
    t.innerHTML = '<span class="h">' + label + '</span><span class="m">' + msg + '</span>';
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3400);
  }

  // Hydrate previously-added entries
  function hydrate() {
    state.added.forEach(function(e) {
      // Find target container by selector hint stored at add time
      let container = document.querySelector(e.containerSel);
      if (!container) return;
      if (container.querySelector('[data-hb-id="' + e.id + '"]')) return;
      container.insertAdjacentHTML('afterbegin', e.html);
    });
  }

  // Wire all matching buttons
  function wire() {
    document.querySelectorAll('button, .btn').forEach(function(b) {
      if (b.dataset.hbWired) return;
      if (!isNewButton(b)) return;
      b.dataset.hbWired = '1';
      b.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        const container = findTarget(b);
        if (!container) {
          showToast('✓ Action staged', 'Could not detect a target list in this view.');
          return;
        }
        const type = classifyButton(b.textContent);
        const entry = renderEntry(type, container);
        // Compute a selector hint for hydration
        let containerSel = '';
        if (container.id) containerSel = '#' + container.id;
        else {
          const cls = (container.className || '').split(/\s+/).filter(Boolean)[0] || container.tagName.toLowerCase();
          containerSel = container.tagName.toLowerCase() + (cls ? '.' + cls : '');
        }
        // Insert
        container.insertAdjacentHTML('afterbegin', entry.html);
        // Save
        state.added.unshift({ id: entry.id, html: entry.html, containerSel: containerSel, t: Date.now() });
        // Keep only last 20 to avoid storage bloat
        state.added = state.added.slice(0, 20);
        save();
        // Highlight new
        const newEl = container.querySelector('[data-hb-id="' + entry.id + '"]');
        if (newEl) {
          newEl.scrollIntoView({behavior: 'smooth', block: 'nearest'});
          newEl.style.transition = 'box-shadow 240ms';
          newEl.style.boxShadow = '0 6px 24px rgba(31,107,58,0.32)';
          setTimeout(function() { newEl.style.boxShadow = ''; }, 1400);
        }
        showToast('✓ ' + type.label.charAt(0).toUpperCase() + type.label.slice(1) + ' added',
                  'Persisted to localStorage. Reload — it stays.');
      }, true);
    });
  }

  function init() { hydrate(); wire(); }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  // Re-wire after dynamic DOM changes (panel switches)
  document.addEventListener('click', function(e) {
    if (e.target.closest('.nav-btn, .view-btn, [data-panel-trigger]')) {
      setTimeout(wire, 50);
    }
  });

  window.hbResetDemoState = function() {
    localStorage.removeItem(KEY);
    location.reload();
  };
})();
</script>
